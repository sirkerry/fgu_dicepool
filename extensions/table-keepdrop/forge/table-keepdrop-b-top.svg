<?xml version="1.0" encoding="UTF-8"?>
<svg width="768" height="768" viewBox="0 0 768 768" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Table Keep/Drop icon</title>
  <desc>A heraldic shield in dark steel with a bright kept die and a faded dropped die at the top, and Table Keep/Drop branding</desc>
  <style>
    .shield-body { fill: #2a2d35; stroke: #c9a84c; stroke-width: 6; }
    .shield-inner { fill: none; stroke: #c9a84c; stroke-width: 3; opacity: 0.5; }
    .sub-text { font-family: serif; font-weight: 400; fill: #a08030; }
    .rivet { fill: #c9a84c; }
  </style>
  <g transform="translate(384, 384)">
    <!-- Shield -->
    <path class="shield-body" d="M0,-300 L225,-228 L255,42 Q255,210 0,300 Q-255,210 -255,42 L-225,-228 Z"/>
    <path class="shield-inner" d="M0,-264 L192,-198 L219,36 Q219,180 0,264 Q-219,180 -219,36 L-192,-198 Z"/>
    <line x1="-219" y1="-30" x2="219" y2="-30" stroke="#c9a84c" stroke-width="2" opacity="0.4"/>

    <!-- Rivets -->
    <circle class="rivet" cx="0" cy="-285" r="9"/>
    <circle class="rivet" cx="-200" cy="-218" r="9"/>
    <circle class="rivet" cx="200" cy="-218" r="9"/>
    <circle class="rivet" cx="-238" cy="42" r="9"/>
    <circle class="rivet" cx="238" cy="42" r="9"/>
    <circle class="rivet" cx="0" cy="285" r="9"/>

    <!-- Dice: dropped (faded, low roll) behind; kept (bright, high roll) in front -->
    <g transform="translate(28, -188) rotate(12)">
      <rect x="-26" y="-26" width="52" height="52" rx="8" fill="#5a5f6b" stroke="#7a808f" stroke-width="2" opacity="0.55"/>
      <circle cx="0" cy="0" r="6" fill="#2a2d35" opacity="0.7"/>
    </g>
    <g transform="translate(-16, -212) rotate(-10)">
      <rect x="-36" y="-36" width="72" height="72" rx="11" fill="#e8c96a" stroke="#c9a84c" stroke-width="3"/>
      <circle cx="-19" cy="-19" r="6" fill="#2a2d35"/>
      <circle cx="19" cy="-19" r="6" fill="#2a2d35"/>
      <circle cx="-19" cy="0" r="6" fill="#2a2d35"/>
      <circle cx="19" cy="0" r="6" fill="#2a2d35"/>
      <circle cx="-19" cy="19" r="6" fill="#2a2d35"/>
      <circle cx="19" cy="19" r="6" fill="#2a2d35"/>
    </g>

    <!-- TABLE (large) -->
    <text x="0" y="60" font-family="serif" font-weight="700" font-size="88" fill="#e8c96a" text-anchor="middle" letter-spacing="4">TABLE</text>

    <!-- Text -->
    <text class="sub-text" x="0" y="170" font-size="34" text-anchor="middle" letter-spacing="4">KEEP/DROP</text>
  </g>
</svg>
